name: Build Extension Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web store package
        run: npm run package:webstore

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chrome-web-store-package
          path: release/*.zip
